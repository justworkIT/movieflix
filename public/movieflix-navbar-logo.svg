<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
<title id="title">MovieFlix Navbar Logo</title>
<desc id="desc">Stylized red M icon followed by ovieflix text on transparent background.</desc>

<defs>
  <linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ff4d5a"/>
    <stop offset="55%" stop-color="#e50914"/>
    <stop offset="100%" stop-color="#8b0000"/>
  </linearGradient>

  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<g transform="translate(20,18)" filter="url(#glow)">
  <path d="M40 180 L120 20 H200 L235 110 L335 20 H450 L360 195 L270 225 L315 115 L205 210 L150 110 L108 180 Z"
        fill="url(#mGrad)"/>
  <path d="M0 235 L130 182 L90 205 L10 248 Z" fill="#ff1a1a" opacity=".95"/>
  <path d="M28 205 L145 160 L118 176 L30 214 Z" fill="#ff6a6a" opacity=".65"/>
  <path d="M118 20 L132 20 L92 132 L78 132 Z" fill="#ffd1d1" opacity=".7"/>
</g>

<text x="430" y="185"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="150"
      font-weight="800"
      fill="#f5f5f5"
      letter-spacing="0">ovieflix</text>

</svg>
